name: Run scrape_books

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install curl_cffi beautifulsoup4

      - name: Run scraper
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python scrape_bookdna.py --pages 3 --pretty

      - name: Guard against empty output
        run: |
          python3 -c "
          import json, sys
          with open('books.json') as f:
              books = json.load(f)
          if len(books) == 0:
              print('Scraper returned 0 books — aborting commit')
              sys.exit(1)
          print(f'OK: {len(books)} books found')
          "

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add books.json
          git commit -m "Auto-update books.json" || exit 0
          git push
